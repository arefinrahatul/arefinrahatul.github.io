<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV – Rahatul Arefin</title>
  <meta name="description" content="View the full CV of Rahatul Arefin, VAT & Corporate Finance Professional.">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ── Design tokens ── */
    :root {
      --bg-primary:    #f8fafc;
      --bg-secondary:  #ffffff;
      --bg-tertiary:   #f1f5f9;
      --border-color:  #e2e8f0;
      --text-primary:  #0f172a;
      --text-secondary:#475569;
      --text-muted:    #64748b;
      --primary:       #0284c7;
      --primary-hover: #0369a1;
      --primary-rgb:   2,132,199;
      --accent:        #0f766e;
      --shadow-sm:  0 1px 2px rgba(0,0,0,.05);
      --shadow-md:  0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -2px rgba(0,0,0,.1);
      --shadow-lg:  0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -4px rgba(0,0,0,.1);
      --radius-sm:   .375rem;
      --radius-md:   .75rem;
      --radius-lg:   1.25rem;
      --radius-full: 9999px;
      --font-heading:'Outfit', sans-serif;
      --font-body:   'Plus Jakarta Sans', sans-serif;
      --tr-fast:     .15s ease;
      --tr-normal:   .3s ease;
    }

    [data-theme="dark"] {
      --bg-primary:    #0b0f19;
      --bg-secondary:  #111827;
      --bg-tertiary:   #1f2937;
      --border-color:  #374151;
      --text-primary:  #f9fafb;
      --text-secondary:#d1d5db;
      --text-muted:    #9ca3af;
      --primary:       #38bdf8;
      --primary-hover: #7dd3fc;
      --primary-rgb:   56,189,248;
      --accent:        #2dd4bf;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden; /* Prevent body scrolling – only viewer scrolls */
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      transition: background var(--tr-normal), color var(--tr-normal);
    }

    a { text-decoration: none; color: var(--primary); transition: color var(--tr-fast); }

    /* ── Top Bar ── */
    .cv-topbar {
      height: 68px;
      background: rgba(248,250,252,.85);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border-color);
      padding: 0 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      box-shadow: var(--shadow-sm);
      transition: background var(--tr-normal), border-color var(--tr-normal);
      flex-shrink: 0;
    }

    [data-theme="dark"] .cv-topbar {
      background: rgba(11,15,25,.85);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }

    /* Redesigned Back Button to look like header navigation logo mark */
    .back-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 0.95rem;
      transition: all var(--tr-fast);
      box-shadow: var(--shadow-sm);
    }

    .back-btn:hover {
      color: #ffffff;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-color: transparent;
      transform: translateX(-3px);
      box-shadow: 0 4px 10px rgba(var(--primary-rgb), 0.25);
    }

    .back-btn i {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .topbar-title {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      line-height: 1.25;
    }

    .topbar-title small {
      font-size: .72rem;
      font-weight: 500;
      color: var(--text-muted);
      font-family: var(--font-body);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: .75rem;
      flex-shrink: 0;
    }

    /* Theme toggle */
    .theme-toggle {
      width: 38px;
      height: 38px;
      border-radius: var(--radius-full);
      border: 1px solid var(--border-color);
      background: var(--bg-secondary);
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: background var(--tr-fast);
      flex-shrink: 0;
      box-shadow: var(--shadow-sm);
    }
    .theme-toggle:hover { background: var(--bg-tertiary); }
    .theme-toggle .fa-sun  { display: none; }
    [data-theme="dark"] .theme-toggle .fa-moon { display: none; }
    [data-theme="dark"] .theme-toggle .fa-sun  { display: block; }

    /* Download button */
    .dl-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      background: var(--primary);
      color: #fff !important;
      padding: 0 1.1rem;
      height: 38px;
      border-radius: var(--radius-md);
      font-weight: 700;
      font-size: .875rem;
      box-shadow: 0 4px 10px rgba(var(--primary-rgb),.25);
      transition: background var(--tr-fast), transform var(--tr-fast), box-shadow var(--tr-fast);
      white-space: nowrap;
      box-sizing: border-box;
    }
    .dl-btn:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(var(--primary-rgb),.35);
    }

    /* Open-in-docs button */
    .open-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
      padding: 0 1rem;
      height: 38px;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: .875rem;
      transition: all var(--tr-fast);
      white-space: nowrap;
      box-shadow: var(--shadow-sm);
      box-sizing: border-box;
    }
    .open-btn:hover {
      color: var(--primary);
      border-color: var(--primary);
      background: var(--bg-tertiary);
    }

    .dl-btn i, .open-btn i {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    /* ── Centered A4 Document Canvas ── */
    .cv-viewer-section {
      flex: 1;
      width: 100%;
      height: calc(100vh - 68px);
      overflow: auto; /* Handles horizontal/vertical scrolls when zoomed */
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: var(--bg-tertiary);
      padding: 2rem 1.5rem;
      position: relative;
    }

    /* Zoom container locked to A4 aspect-ratio (1 : 1.4142) */
    .iframe-container {
      width: 100%;
      max-width: 820px;
      aspect-ratio: 1 / 1.4142;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden; /* Hide internal scrollbars of scaled iframe */
      transition: width 0.25s cubic-bezier(0.4, 0, 0.2, 1), 
                  max-width 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: top center;
      margin: 0 auto;
    }

    .iframe-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 820px; /* Fixed virtual width */
      height: 100%;
      border: none;
      border-radius: var(--radius-md);
      transform-origin: top left;
      display: block;
    }

    /* Loading spinner overlay */
    .iframe-loader {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: var(--bg-secondary);
      pointer-events: none;
      transition: opacity .4s ease;
      z-index: 2;
      border-radius: var(--radius-md);
    }

    .iframe-loader.hidden { opacity: 0; }

    .loader-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--border-color);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    .iframe-loader p {
      font-size: .9rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Floating Zoom Toolbar ── */
    .zoom-toolbar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-full);
      padding: 6px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: var(--shadow-lg);
      z-index: 100;
      transition: background var(--tr-normal), border-color var(--tr-normal);
    }

    .zoom-toolbar button {
      background: none;
      border: none;
      color: var(--text-primary);
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background var(--tr-fast);
      font-size: 0.9rem;
    }

    .zoom-toolbar button:hover {
      background: var(--bg-tertiary);
    }

    .zoom-toolbar span {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.85rem;
      min-width: 46px;
      text-align: center;
      user-select: none;
    }

    .zoom-divider {
      width: 1px;
      height: 16px;
      background-color: var(--border-color);
      margin: 0 4px;
    }

    /* ── Mobile adjustments ── */
    @media (max-width: 640px) {
      .cv-topbar { padding: 0 4%; height: 60px; }
      .topbar-title { display: none; }
      .open-btn { display: none; } /* Hide open in docs on small viewports */
      
      .cv-viewer-section { 
        padding: 1.5rem 1rem; /* Centered box margins on mobile */
        height: calc(100vh - 60px);
      }
      
      .iframe-container {
        aspect-ratio: 1 / 1.4142; /* A4 aspect-ratio on mobile */
        max-width: 100%;
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-md);
      }
      
      .iframe-container iframe,
      .iframe-loader {
        border-radius: var(--radius-md);
      }

      .zoom-toolbar {
        bottom: 16px;
        padding: 4px 10px;
        gap: 4px;
      }
      
      .zoom-toolbar button {
        width: 28px;
        height: 28px;
      }
      
      .zoom-toolbar span {
        font-size: 0.8rem;
        min-width: 40px;
      }
    }
  </style>
</head>
<body>

  <!-- ── Top bar navigation ── -->
  <header class="cv-topbar">
    <div class="topbar-left">
      <a href="index.html" class="back-btn" title="Back to Portfolio">
        <i class="fas fa-arrow-left"></i>
      </a>
      <div class="topbar-title">
        Rahatul Arefin — CV
        <small>VAT &amp; Corporate Finance Professional</small>
      </div>
    </div>

    <div class="topbar-right">
      <a
        href="https://docs.google.com/document/d/1j3ClFDeV3Xis5cvnN0WtMOF0lhUicpC5/"
        target="_blank"
        rel="noopener noreferrer"
        class="open-btn"
        title="View Full Document"
      >
        <i class="fas fa-external-link-alt"></i> Full View
      </a>

      <a
        href="https://docs.google.com/document/d/1j3ClFDeV3Xis5cvnN0WtMOF0lhUicpC5/export?format=pdf"
        target="_blank"
        rel="noopener noreferrer"
        class="dl-btn"
        title="Download PDF Copy"
      >
        <i class="fas fa-file-pdf"></i> <span>Download PDF</span>
      </a>

      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <i class="fas fa-moon"></i>
        <i class="fas fa-sun"></i>
      </button>
    </div>
  </header>

  <!-- ── Fullscreen CV Canvas ── -->
  <main class="cv-viewer-section">

    <!-- Iframe wrapper container -->
    <div class="iframe-container" id="iframe-container">
      <!-- Loading spinner overlay -->
      <div class="iframe-loader" id="iframe-loader">
        <div class="loader-spinner"></div>
        <p>Loading CV document preview…</p>
      </div>

      <!-- Google Docs preview embed -->
      <iframe
        id="cv-iframe"
        src="https://docs.google.com/document/d/1j3ClFDeV3Xis5cvnN0WtMOF0lhUicpC5/preview"
        title="Rahatul Arefin – Curriculum Vitae"
        loading="lazy"
      ></iframe>
    </div>

    <!-- Floating Zoom Controls -->
    <div class="zoom-toolbar">
      <button id="zoom-out" title="Zoom Out"><i class="fas fa-minus"></i></button>
      <span id="zoom-value">100%</span>
      <button id="zoom-in" title="Zoom In"><i class="fas fa-plus"></i></button>
      <div class="zoom-divider"></div>
      <button id="zoom-reset" title="Reset to Fit Screen"><i class="fas fa-arrows-alt"></i></button>
    </div>

  </main>

  <script>
    // ── Theme management ──
    const themeToggleBtn = document.getElementById('theme-toggle');

    const setTheme = (theme) => {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
    };

    const currentTheme = localStorage.getItem('theme') ||
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    setTheme(currentTheme);

    themeToggleBtn.addEventListener('click', () => {
      const activeTheme = document.documentElement.getAttribute('data-theme');
      setTheme(activeTheme === 'dark' ? 'light' : 'dark');
    });

    // ── Hide spinner once iframe loads ──
    const iframe = document.getElementById('cv-iframe');
    const loader = document.getElementById('iframe-loader');

    iframe.addEventListener('load', () => {
      loader.classList.add('hidden');
      setTimeout(() => loader.style.display = 'none', 450);
    });

    // Fallback: auto hide loader after 7 seconds
    setTimeout(() => {
      if (loader.style.display !== 'none') {
        loader.classList.add('hidden');
        setTimeout(() => loader.style.display = 'none', 450);
      }
    }, 7000);

    // ── Proportional Zoom Engine ──
    let currentZoom = 100; // Zoom percentage
    const iframeContainer = document.getElementById('iframe-container');
    const zoomValDisplay = document.getElementById('zoom-value');

    const updateZoom = () => {
      const scaleFactor = currentZoom / 100;
      const isMobile = window.innerWidth <= 640;
      const topBarHeight = isMobile ? 60 : 68;
      
      // Horizontal padding around the card box:
      // Mobile: 2rem total (32px). Desktop: 3rem total (48px)
      const paddingX = isMobile ? 32 : 48;
      // Vertical padding around the card box:
      // Mobile: 3rem total (48px). Desktop: 4rem total (64px)
      const paddingY = isMobile ? 48 : 64;
      
      const availWidth = window.innerWidth - paddingX;
      const availHeight = window.innerHeight - topBarHeight - paddingY;
      
      // Calculate base width that fits both width and height constraints
      const baseWidth = Math.min(820, availWidth, availHeight / 1.4142);
      
      // Target width of the container at current zoom
      const containerWidth = baseWidth * scaleFactor;
      
      // Apply width and overrides to container card box
      iframeContainer.style.width = `${containerWidth}px`;
      iframeContainer.style.maxWidth = 'none';
      iframeContainer.style.height = 'auto'; // aspect-ratio automatically calculates height
      
      // Virtual width of the Google Doc page
      const virtualDocWidth = 820;
      
      // Scale to apply to iframe to fit inside container width
      const iframeScale = containerWidth / virtualDocWidth;
      
      // Scale iframe and expand its height proportionally
      iframe.style.width = `${virtualDocWidth}px`;
      iframe.style.height = `${100 / iframeScale}%`;
      iframe.style.transform = `scale(${iframeScale})`;
      
      // Fit loader overlay to the iframe dimensions
      loader.style.width = `${virtualDocWidth}px`;
      loader.style.height = `${100 / iframeScale}%`;
      loader.style.transform = `scale(${iframeScale})`;
      loader.style.transformOrigin = 'top left';
      
      zoomValDisplay.textContent = `${currentZoom}%`;
    };

    // Run zoom initialization once on startup
    updateZoom();

    document.getElementById('zoom-in').addEventListener('click', () => {
      if (currentZoom < 200) {
        currentZoom += 10;
        updateZoom();
      }
    });

    document.getElementById('zoom-out').addEventListener('click', () => {
      if (currentZoom > 50) {
        currentZoom -= 10;
        updateZoom();
      }
    });

    document.getElementById('zoom-reset').addEventListener('click', () => {
      currentZoom = 100;
      updateZoom();
    });

    // Listen to resize to recalculate 100% viewport heights
    window.addEventListener('resize', () => {
      updateZoom();
    });
  </script>

</body>
</html>
